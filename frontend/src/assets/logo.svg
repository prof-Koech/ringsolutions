<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="54" stroke="url(#grad1)" stroke-width="8" fill="none"/>
  <!-- Middle ring -->
  <circle cx="60" cy="60" r="36" stroke="url(#grad2)" stroke-width="5" fill="none" stroke-dasharray="6 4" opacity="0.7"/>
  <!-- Inner solid circle -->
  <circle cx="60" cy="60" r="14" fill="url(#grad1)"/>
  <!-- Signal arc top-right -->
  <path d="M60 12 Q88 28 88 60" stroke="url(#grad1)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Signal arc top-left -->
  <path d="M60 12 Q32 28 32 60" stroke="url(#grad2)" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Dot at top -->
  <circle cx="60" cy="12" r="5" fill="#1890ff"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1890ff"/>
      <stop offset="100%" stop-color="#0050b3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="120" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#40a9ff"/>
      <stop offset="100%" stop-color="#1890ff"/>
    </linearGradient>
  </defs>
</svg>
